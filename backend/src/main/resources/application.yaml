spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/uroom
    username: uroom
    password: uroom
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:uroom-super-secret-jwt-signing-key-change-in-production-32chars}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
